# Flatpak manifest (starting point — validate with flatpak-builder on a real box).
#
#   flatpak install flathub org.kde.Platform//6.7 org.kde.Sdk//6.7
#   flatpak-builder --user --install --force-clean build-dir data/com.honganh.antinote-qt.yml
#   flatpak run com.honganh.antinote-qt
#
# The KDE runtime supplies Qt 6. PySide6 + python-xlib are installed into the app
# via pip during the build (pinned wheels should be added under python3-modules for
# a fully offline/reproducible build).
app-id: com.honganh.antinote-qt
runtime: org.kde.Platform
runtime-version: "6.7"
sdk: org.kde.Sdk
command: antinote
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --talk-name=org.freedesktop.portal.GlobalShortcuts
  - --filesystem=xdg-config/antinote-qt:create
  # Read-only access to import notes from the old Electron/Tauri builds on first launch:
  - --filesystem=xdg-config/Antinote:ro
modules:
  - name: antinote-qt
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-build-isolation .
      - install -Dm644 data/com.honganh.antinote-qt.desktop /app/share/applications/com.honganh.antinote-qt.desktop
      - install -Dm644 data/com.honganh.antinote-qt.metainfo.xml /app/share/metainfo/com.honganh.antinote-qt.metainfo.xml
      - install -Dm644 antinote_qt/icon.png /app/share/icons/hicolor/256x256/apps/com.honganh.antinote-qt.png
    sources:
      - type: dir
        path: ..
