name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install AppImage runtime dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build app (electron-vite)
        run: npm run build

      - name: Package (.deb + .AppImage)
        # electron-builder rebuilds the better-sqlite3 native module for the
        # Electron target (npmRebuild: true in electron-builder.yml).
        run: npx electron-builder --linux deb AppImage

      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist/*.AppImage
            dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
