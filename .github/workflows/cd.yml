name: CD

on:
  workflow_call:
    inputs:
      commit_sha:
        description: Commit that passed CI
        required: true
        type: string
      run_number:
        description: CI run number used for the release version
        required: true
        type: string

permissions:
  contents: write

jobs:
  deb:
    name: Build and release .deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: System libs for Qt
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3
      - name: Install + PyInstaller
        run: pip install pyinstaller .
      - name: Freeze app
        run: pyinstaller --noconfirm packaging/lazynote.spec
      - name: Calculate version
        id: version
        env:
          COMMIT_SHA: ${{ inputs.commit_sha }}
          RUN_NUMBER: ${{ inputs.run_number }}
        run: |
          SHORT_SHA="${COMMIT_SHA::7}"
          VERSION="0.1.${RUN_NUMBER}+g${SHORT_SHA}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
      - name: Build .deb
        run: bash packaging/build-deb.sh "${{ steps.version.outputs.version }}"
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ inputs.commit_sha }}
          name: Lazynote ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/*.deb
